<!doctype html>
<html lang="es" translate="no">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="google" content="notranslate" />
        <meta name="description" content="Educando - Aplicación de gestión educativa" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
        <title>Educando - Gestión Educativa</title>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&(e.error.name==="NotFoundError"||e.error.name==="HierarchyRequestError")){e.stopImmediatePropagation();e.preventDefault();return;}if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault();return;}var isScriptSyntaxError=(e.error instanceof SyntaxError&&typeof e.filename==="string"&&e.filename.indexOf("/static/")!==-1);var isScriptLoadError=(e.target&&e.target.tagName==="SCRIPT"&&e.target.src&&e.target.src.indexOf("/static/")!==-1);if(isScriptSyntaxError||isScriptLoadError){var last=parseInt(sessionStorage.getItem("_stale_reload")||"0",10);if(Date.now()-last>10000){sessionStorage.setItem("_stale_reload",String(Date.now()));window.location.reload();}}},true);</script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
