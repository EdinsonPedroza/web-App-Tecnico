services:
  # Backend API Service
  - type: web
    name: educando-backend
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
        # ⚠️ IMPORTANTE: sync: false significa que esta variable NO se sincroniza desde Git
        # Razón: La connection string contiene credenciales sensibles (usuario/password)
        # Esta variable DEBE ser configurada manualmente en el Dashboard de Render
        # Ver archivo RENDER_MONGODB_SETUP.md para instrucciones completas
        # Ejemplo: mongodb+srv://usuario:password@cluster.mongodb.net/WebApp?retryWrites=true&w=majority
      - key: DB_NAME
        value: WebApp
      - key: CORS_ORIGINS
        value: "https://corporacioneducando.com,https://www.corporacioneducando.com"
        # ⚠️ PRODUCCIÓN: Agrega también la URL pública del frontend en Render, p.ej.:
        # "https://educando-frontend.onrender.com,https://corporacioneducando.com,https://www.corporacioneducando.com"
        # Nunca uses "*" en producción ya que permite solicitudes desde cualquier origen.
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: WORKERS
        value: "2"
        # Starter (512MB): 2 workers. Para 1,500+ estudiantes con plan Standard (1GB RAM) subir a 4.
      - key: DEBUG
        value: false
      - key: ALLOW_USER_RESET
        value: false
      - key: AUTO_RECOVERY_ENABLED_AT
        value: "2026-05-05T00:00:00+00:00"
        # Fecha desde la que se cuentan talleres vencidos para auto-recuperación.
        # Solo talleres con due_date >= este valor acumulan hacia el umbral de 4.
      - key: MAX_OVERDUE_BEFORE_RECOVERY
        value: "4"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET_NAME
        sync: false
      - key: AWS_S3_REGION
        sync: false
    autoDeploy: true

  # Frontend Web Service
  - type: web
    name: educando-frontend
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
        # Dejar VACÍO para que el frontend use URLs relativas y nginx haga el proxy al backend.
        # Solo establecer este valor si el frontend necesita comunicarse con un backend externo.
      - key: BACKEND_URL
        sync: false
        # ⚠️ Comunicación frontend→backend via Internal Address HTTP de Render.
        # Configurar con la dirección interna del backend, p.ej.: http://educando-backend:10000
        # NO usar la URL pública HTTPS para la comunicación inter-servicio interna.
      - key: PORT
        value: 10000
    autoDeploy: true

################################################################################
# CONFIGURACIÓN DE MONGODB - ¡MUY IMPORTANTE!
################################################################################
#
# ⚠️  RENDER NO INCLUYE MONGODB AUTOMÁTICAMENTE ⚠️
#
# Debes configurar MongoDB manualmente antes de que la aplicación funcione.
# Sin MongoDB, las credenciales NO FUNCIONARÁN y verás errores de autenticación.
#
# 📖 GUÍA COMPLETA: Ver archivo RENDER_MONGODB_SETUP.md
#
# OPCIONES PARA MONGODB:
#
# ✅ Opción 1: MongoDB Atlas (RECOMENDADO - Gratis hasta 512MB)
#    1. Crea cuenta en: https://www.mongodb.com/cloud/atlas/register
#    2. Crea un cluster gratuito (M0)
#    3. Crea un usuario de base de datos
#    4. Permite acceso desde cualquier IP (0.0.0.0/0)
#    5. Copia la connection string
#    6. En Render Dashboard → educando-backend → Environment
#       Agrega MONGO_URL con tu connection string
#
# ✅ Opción 2: Render Private Services (MongoDB)
#    1. En Render Dashboard → New + → Private Service → MongoDB
#    2. Copia la Internal Connection String
#    3. En educando-backend → Environment
#       Agrega MONGO_URL con la connection string interna
#
# VERIFICAR QUE MONGODB ESTÉ CONECTADO:
#    1. Ve a Render Dashboard → educando-backend → Logs
#    2. Busca: "MongoDB connection successful"
#    3. Busca: "Datos iniciales verificados/creados exitosamente"
#    4. Busca: "7 usuarios semilla disponibles"
#
# IMPORTANTE: La base de datos debe llamarse "WebApp" (con W y A mayúsculas)
# En tu connection string de MongoDB Atlas, asegúrate de especificar:
# mongodb+srv://usuario:password@cluster.mongodb.net/WebApp?retryWrites=true&w=majority
#                                                          ^^^^^^
# NOTA: Cuando configures MONGO_URL en Render, asegúrate de que incluya "/WebApp"
# al final de la URL de conexión (antes de los parámetros de query como ?retryWrites=true)
#
# Si NO ves estos mensajes, MongoDB no está conectado correctamente.
#
# CREDENCIALES DE USUARIOS:
#    Ver archivo: USUARIOS_Y_CONTRASEÑAS.txt
#
################################################################################
